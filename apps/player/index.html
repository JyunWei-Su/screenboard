<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>ScreenBoard Player (preview)</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #stage { position: fixed; inset: 0; background: #000; }

  /* Legacy single-item playlist elements are appended directly to #stage. */
  .pl-item {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: 0; object-fit: contain; background: #000;
  }

  /* A whole scene renders inside one layer so it can be swapped atomically. */
  .scene-layer { position: fixed; inset: 0; background: transparent; }
  .scene-canvas { position: absolute; top: 0; left: 0; transform-origin: top left; overflow: hidden; background: transparent; }
  .scene-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .widget { position: absolute; overflow: hidden; }
  .widget > * { width: 100%; height: 100%; box-sizing: border-box; }
  .widget img, .widget video { display: block; width: 100%; height: 100%; object-fit: contain; }
  .widget iframe { width: 100%; height: 100%; border: 0; }
  .widget-error {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 8px; box-sizing: border-box; color: #fca5a5;
    background: rgba(20, 20, 24, .82);
    font: 600 clamp(12px, 2.2vw, 22px)/1.35 "Noto Sans CJK TC", system-ui, sans-serif;
  }
  .ticker-wrap { position: absolute; inset: 0; overflow: hidden; display: flex; align-items: center; }
  .ticker-content { white-space: nowrap; will-change: transform; }
  .clock { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; font-family: system-ui, sans-serif; }
  .clock-date { opacity: .8; }
  .direction { display: flex; flex-direction: column; justify-content: center; height: 100%; gap: .25em; font-family: system-ui, sans-serif; }
  .direction-row { display: flex; align-items: center; gap: .4em; }
  .direction-arrow { flex: 0 0 auto; }
  .text-widget { display: flex; height: 100%; box-sizing: border-box; padding: .3em; font-family: system-ui, sans-serif; }
  .text-widget > div { white-space: pre-wrap; overflow-wrap: anywhere; }
  #msg, #idle {
    position: absolute; inset: 0; color: #666; font: 500 20px system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px;
  }
</style>
</head>
<body>
<div id="stage"><div id="msg">Loading…</div></div>
<script>
/*
 * Standalone / preview player. Mirrors the agent's embedded scene renderer but
 * fetches straight from the API instead of the local agent server.
 *
 * Usage (pick one source):
 *   index.html?api=<API_BASE>&token=<TOKEN>&playlist=<ID>        (legacy playlist)
 *   index.html?api=<API_BASE>&token=<TOKEN>&scene=<ID>           (single scene)
 *   index.html?api=<API_BASE>&token=<TOKEN>&scene_playlist=<ID>  (rotate scenes)
 *   index.html?src=<absolute URL to any resolved JSON / ResolvedTarget>&token=<TOKEN>
 */
(() => {
  const Q = new URLSearchParams(location.search);
  const API = (Q.get('api') || '').replace(/\/$/, '');
  const TOKEN = Q.get('token') || localStorage.getItem('sb_token') || '';
  const SRC_URL = Q.get('src') || '';

  // Preview has no local proxy; `web` proxy widgets fall back to a direct embed.
  const PROXY_BASE = null;
  // Media URLs are absolute API URLs that need auth; append the token so plain
  // <img>/<video> element loads (which cannot set an Authorization header) work.
  const SRC = (u) => {
    if (!u) return '';
    if (!u.includes('/api/content/')) return u;
    return u + (u.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(TOKEN);
  };
  const stage = document.getElementById('stage');

  const WIDGET_TIMEOUT = 6000;
  const WEB_TIMEOUT = 9000;
  const REVEAL_TIMEOUT = 10000;

  const ARROWS = { up:'↑', down:'↓', left:'←', right:'→',
    'up-left':'↖', 'up-right':'↗', 'down-left':'↙', 'down-right':'↘' };

  // No local /event endpoint in preview mode.
  function report() {}

  // ================= shared rendering engine =================

  let switchSerial = 0, sceneTimer = null, genId = 0, mode = null, revKey = null;
  let plItems = [], plIdx = 0, plLoop = true, plTimer = null, plSerial = 0;

  function disposeAndRemove(el) {
    if (!el) return;
    if (el._dispose) { try { el._dispose(); } catch (_) {} }
    if (el.remove) el.remove();
  }
  function keepOnly(node) {
    for (const ch of Array.from(stage.children)) if (ch !== node) disposeAndRemove(ch);
  }
  function showWidgetError(box, msg) {
    if (!box) return;
    const d = document.createElement('div');
    d.className = 'widget-error';
    d.textContent = msg;
    box.appendChild(d);
  }

  function mediaReady(el, wg, ctx, code, label) {
    return new Promise((resolve) => {
      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      el.addEventListener('load', finish, { once: true });
      el.addEventListener('error', () => { ctx.errors[wg.id] = code; showWidgetError(el.parentNode, label); finish(); }, { once: true });
      setTimeout(finish, WIDGET_TIMEOUT);
    });
  }

  function buildImage(wg, ctx) {
    const cfg = wg.config || {};
    const el = document.createElement('img');
    el.style.objectFit = cfg.fit || 'contain';
    el.src = SRC(cfg.source || cfg.url || '');
    return { el, ready: mediaReady(el, wg, ctx, 'image load failed', '圖片載入失敗') };
  }

  function buildVideo(wg, ctx) {
    const cfg = wg.config || {};
    const el = document.createElement('video');
    el.style.objectFit = cfg.fit || 'contain';
    el.autoplay = true;
    el.muted = cfg.muted !== false;
    el.playsInline = true;
    el.loop = cfg.loop !== false;
    el.controls = false;
    el.src = SRC(cfg.source || cfg.url || '');
    const ready = new Promise((resolve) => {
      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      el.addEventListener('canplay', () => { el.play().catch(() => {}); finish(); }, { once: true });
      el.addEventListener('error', () => { ctx.errors[wg.id] = 'video load failed'; showWidgetError(el.parentNode, '影片載入失敗'); finish(); }, { once: true });
      setTimeout(finish, WIDGET_TIMEOUT);
    });
    return { el, ready };
  }

  function buildWeb(wg, ctx) {
    const cfg = wg.config || {};
    const wmode = cfg.mode || 'embed';
    const raw = cfg.url || cfg.source || '';
    const el = document.createElement('iframe');
    el.setAttribute('scrolling', 'no');
    el.setAttribute('referrerpolicy', 'no-referrer');
    el.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms');
    let src = raw;
    if (wmode === 'proxy' && PROXY_BASE) src = PROXY_BASE + '?url=' + encodeURIComponent(raw);
    else src = SRC(raw);
    el.src = src;
    const ready = new Promise((resolve) => {
      let loaded = false, done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      el.addEventListener('load', () => { loaded = true; finish(); }, { once: true });
      el.addEventListener('error', () => { ctx.errors[wg.id] = 'web load failed'; showWidgetError(el.parentNode, '網頁載入失敗'); finish(); }, { once: true });
      setTimeout(() => {
        if (!loaded) { ctx.errors[wg.id] = 'web load timeout (embedding may be blocked)'; showWidgetError(el.parentNode, '網頁無法嵌入'); }
        finish();
      }, WEB_TIMEOUT);
    });
    if (cfg.refresh_sec > 0) {
      const iv = setInterval(() => { try { el.src = src; } catch (_) {} }, cfg.refresh_sec * 1000);
      ctx.timers.push(() => clearInterval(iv));
    }
    return { el, ready };
  }

  function buildText(wg) {
    const cfg = wg.config || {};
    const box = document.createElement('div');
    box.className = 'text-widget';
    box.style.color = cfg.color || '#fff';
    if (cfg.background) box.style.background = cfg.background;
    box.style.fontSize = (cfg.font_size || Math.round(wg.height * 0.35)) + 'px';
    box.style.fontWeight = String(cfg.weight || 400);
    const align = cfg.align || 'left';
    box.style.textAlign = align;
    box.style.alignItems = 'center';
    box.style.justifyContent = align === 'center' ? 'center' : align === 'right' ? 'flex-end' : 'flex-start';
    const span = document.createElement('div');
    span.textContent = cfg.text || '';
    box.appendChild(span);
    return { el: box, ready: Promise.resolve() };
  }

  function buildTicker(wg, ctx) {
    const cfg = wg.config || {};
    const dir = cfg.direction || 'left';
    const vertical = dir === 'up' || dir === 'down';
    const wrap = document.createElement('div');
    wrap.className = 'ticker-wrap';
    if (cfg.background) wrap.style.background = cfg.background;
    if (vertical) wrap.style.flexDirection = 'column';
    const content = document.createElement('div');
    content.className = 'ticker-content';
    if (cfg.color) content.style.color = cfg.color;
    if (vertical) content.style.whiteSpace = 'normal';
    content.style.fontSize = (cfg.font_size || Math.round(wg.height * 0.55)) + 'px';
    content.textContent = cfg.text || '';
    wrap.appendChild(content);

    const speed = Math.max(10, cfg.speed || 80);
    let pos = 0, last = 0, raf = 0;
    function reset() {
      if (dir === 'left') pos = wg.width;
      else if (dir === 'right') pos = -content.scrollWidth;
      else if (dir === 'up') pos = wg.height;
      else pos = -content.scrollHeight;
      last = performance.now();
    }
    function step(now) {
      const dt = Math.min(0.1, (now - last) / 1000); last = now;
      if (dir === 'left') { pos -= speed * dt; if (pos < -content.scrollWidth) pos = wg.width; content.style.transform = `translateX(${pos}px)`; }
      else if (dir === 'right') { pos += speed * dt; if (pos > wg.width) pos = -content.scrollWidth; content.style.transform = `translateX(${pos}px)`; }
      else if (dir === 'up') { pos -= speed * dt; if (pos < -content.scrollHeight) pos = wg.height; content.style.transform = `translateY(${pos}px)`; }
      else { pos += speed * dt; if (pos > wg.height) pos = -content.scrollHeight; content.style.transform = `translateY(${pos}px)`; }
      raf = requestAnimationFrame(step);
    }
    requestAnimationFrame(() => { reset(); raf = requestAnimationFrame(step); });
    ctx.timers.push(() => cancelAnimationFrame(raf));

    if (cfg.source_url) {
      const loadFeed = async () => {
        try {
          const r = await fetch(cfg.source_url, { cache: 'no-store' });
          const ct = r.headers.get('content-type') || '';
          const txt = ct.includes('json') ? tickerFromJSON(await r.json()) : await r.text();
          if (txt) { content.textContent = txt; reset(); }
        } catch (_) {}
      };
      loadFeed();
      const iv = setInterval(loadFeed, 60000);
      ctx.timers.push(() => clearInterval(iv));
    }
    return { el: wrap, ready: Promise.resolve() };
  }
  function tickerFromJSON(j) {
    if (typeof j === 'string') return j;
    if (Array.isArray(j)) return j.map((x) => (typeof x === 'string' ? x : (x && x.text) || '')).filter(Boolean).join('   •   ');
    if (j && typeof j === 'object') {
      if (typeof j.text === 'string') return j.text;
      if (Array.isArray(j.items)) return tickerFromJSON(j.items);
    }
    return '';
  }

  function buildDirection(wg) {
    const cfg = wg.config || {};
    const entries = Array.isArray(cfg.entries) ? cfg.entries : [];
    const box = document.createElement('div');
    box.className = 'direction';
    if (cfg.background) box.style.background = cfg.background;
    box.style.color = cfg.color || '#fff';
    box.style.fontSize = (cfg.font_size || Math.round(wg.height / Math.max(2, entries.length + 1))) + 'px';
    for (const e of entries) {
      const row = document.createElement('div');
      row.className = 'direction-row';
      const ar = document.createElement('span');
      ar.className = 'direction-arrow';
      ar.textContent = ARROWS[e.arrow] || '→';
      const lb = document.createElement('span');
      lb.className = 'direction-label';
      lb.textContent = e.label || '';
      row.appendChild(ar); row.appendChild(lb);
      box.appendChild(row);
    }
    return { el: box, ready: Promise.resolve() };
  }

  function buildClock(wg, ctx) {
    const cfg = wg.config || {};
    const box = document.createElement('div');
    box.className = 'clock';
    if (cfg.background) box.style.background = cfg.background;
    box.style.color = cfg.color || '#fff';
    const base = cfg.font_size || Math.round(wg.height * 0.42);
    const timeEl = document.createElement('div');
    timeEl.className = 'clock-time';
    timeEl.style.fontSize = base + 'px';
    box.appendChild(timeEl);
    let dateEl = null;
    if (cfg.show_date) {
      dateEl = document.createElement('div');
      dateEl.className = 'clock-date';
      dateEl.style.fontSize = Math.round(base * 0.4) + 'px';
      box.appendChild(dateEl);
    }
    const use12 = cfg.format === '12h';
    function tick() {
      const now = new Date();
      const topt = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: use12 };
      const dopt = { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' };
      if (cfg.timezone) { topt.timeZone = cfg.timezone; dopt.timeZone = cfg.timezone; }
      try { timeEl.textContent = new Intl.DateTimeFormat(undefined, topt).format(now); }
      catch (_) { timeEl.textContent = now.toLocaleTimeString(); }
      if (dateEl) {
        try { dateEl.textContent = new Intl.DateTimeFormat(undefined, dopt).format(now); }
        catch (_) { dateEl.textContent = now.toLocaleDateString(); }
      }
    }
    tick();
    const iv = setInterval(tick, 1000);
    ctx.timers.push(() => clearInterval(iv));
    return { el: box, ready: Promise.resolve() };
  }

  function buildWidget(wg, ctx) {
    switch (wg.kind) {
      case 'image': return buildImage(wg, ctx);
      case 'video': return buildVideo(wg, ctx);
      case 'web': return buildWeb(wg, ctx);
      case 'text': return buildText(wg, ctx);
      case 'ticker': return buildTicker(wg, ctx);
      case 'direction': return buildDirection(wg, ctx);
      case 'clock': return buildClock(wg, ctx);
      default: {
        ctx.errors[wg.id] = 'unknown widget kind: ' + wg.kind;
        const d = document.createElement('div');
        d.className = 'widget-error';
        d.textContent = '未知元件：' + wg.kind;
        return { el: d, ready: Promise.resolve() };
      }
    }
  }

  function sceneSize(scene) {
    return { w: scene.width > 0 ? scene.width : 1920, h: scene.height > 0 ? scene.height : 1080 };
  }
  function layoutCanvas(canvas, scene) {
    const { w, h } = sceneSize(scene);
    const vw = window.innerWidth, vh = window.innerHeight;
    const s = Math.min(vw / w, vh / h);
    canvas.style.transform = `translate(${(vw - w * s) / 2}px, ${(vh - h * s) / 2}px) scale(${s})`;
  }

  function buildSceneLayer(scene) {
    const { w, h } = sceneSize(scene);
    const layer = document.createElement('div');
    layer.className = 'scene-layer';
    const canvas = document.createElement('div');
    canvas.className = 'scene-canvas';
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas._scene = scene;
    const bg = scene.background || {};
    if (bg.color) canvas.style.background = bg.color;

    const ctx = { errors: {}, timers: [] };
    const readies = [];

    if (bg.source) {
      const bgImg = document.createElement('img');
      bgImg.className = 'scene-bg';
      bgImg.src = SRC(bg.source);
      readies.push(new Promise((res) => {
        let d = false; const f = () => { if (!d) { d = true; res(); } };
        bgImg.addEventListener('load', f, { once: true });
        bgImg.addEventListener('error', f, { once: true });
        setTimeout(f, WIDGET_TIMEOUT);
      }));
      canvas.appendChild(bgImg);
    }

    const widgets = (scene.widgets || []).slice().sort((a, b) => (a.z || 0) - (b.z || 0));
    for (const wg of widgets) {
      const box = document.createElement('div');
      box.className = 'widget';
      box.style.left = (wg.x || 0) + 'px';
      box.style.top = (wg.y || 0) + 'px';
      box.style.width = (wg.width || 0) + 'px';
      box.style.height = (wg.height || 0) + 'px';
      box.style.zIndex = String((wg.z || 0) + 1);
      const built = buildWidget(wg, ctx);
      box.appendChild(built.el);
      canvas.appendChild(box);
      if (built.ready) readies.push(built.ready);
    }

    layer.appendChild(canvas);
    layer._dispose = () => { for (const fn of ctx.timers) { try { fn(); } catch (_) {} } };
    return { el: layer, canvas, readies, errors: ctx.errors };
  }

  function allReady(readies) {
    return Promise.race([
      Promise.all(readies.map((p) => p.catch(() => {}))),
      new Promise((res) => setTimeout(res, REVEAL_TIMEOUT)),
    ]);
  }

  async function showScene(scene) {
    const serial = ++switchSerial;
    const layer = buildSceneLayer(scene);
    layer.el.style.visibility = 'hidden';
    stage.appendChild(layer.el);
    layoutCanvas(layer.canvas, scene);
    await allReady(layer.readies);
    if (serial !== switchSerial) { disposeAndRemove(layer.el); return; }
    layer.el.style.visibility = 'visible';
    keepOnly(layer.el);
  }

  function startScene(sc) { showScene(sc); }

  function startScenePlaylist(spl) {
    const scenes = spl.scenes || [];
    const loop = spl.loop !== false;
    const gen = genId;
    let i = 0;
    async function rotate() {
      if (gen !== genId) return;
      if (!scenes.length) { showIdle('Empty scene playlist'); return; }
      const entry = scenes[i] || {};
      if (entry.scene) await showScene(entry.scene);
      if (gen !== genId) return;
      const dwell = Math.max(1000, (entry.dwell_sec || 10) * 1000);
      clearTimeout(sceneTimer);
      sceneTimer = setTimeout(() => {
        i++;
        if (i >= scenes.length) { if (!loop) return; i = 0; }
        rotate();
      }, dwell);
    }
    rotate();
  }

  function showIdle(text) {
    const idle = document.createElement('div');
    idle.id = 'idle';
    idle.textContent = text || 'ScreenBoard';
    stage.appendChild(idle);
    keepOnly(idle);
  }

  // ---- Legacy single-item playlist path. ----
  function startPlaylist(pl) {
    plItems = pl.items || [];
    plIdx = 0;
    plLoop = pl.loop !== false;
    if (plItems.length) plShow(); else showIdle('Empty playlist');
  }
  function plAdvance() {
    if (mode !== 'playlist') return;
    plIdx++;
    if (plIdx >= plItems.length) { if (!plLoop) return; plIdx = 0; }
    plShow();
  }
  function plShow() {
    if (mode !== 'playlist') return;
    if (plTimer) { clearTimeout(plTimer); plTimer = null; }
    const item = plItems[plIdx];
    if (!item) return;
    const dur = (item.duration_sec || 10) * 1000;
    const serial = ++plSerial;
    let el, revealed = false;
    const reveal = () => {
      if (revealed || serial !== plSerial) return;
      revealed = true;
      el.style.visibility = 'visible';
      keepOnly(el);
    };
    if (item.type === 'image') {
      el = document.createElement('img'); el.className = 'pl-item'; el.src = SRC(item.source);
      el.onload = reveal; el.onerror = reveal;
      plTimer = setTimeout(plAdvance, dur);
    } else if (item.type === 'video') {
      el = document.createElement('video'); el.className = 'pl-item'; el.src = SRC(item.source);
      el.autoplay = true; el.muted = true; el.playsInline = true; el.controls = false;
      el.oncanplay = reveal; el.onended = plAdvance;
      el.onerror = () => { reveal(); plAdvance(); };
      plTimer = setTimeout(plAdvance, dur + 2000);
    } else {
      el = document.createElement('iframe'); el.className = 'pl-item'; el.src = SRC(item.source);
      el.setAttribute('scrolling', 'no');
      el.onload = reveal; el.onerror = reveal;
      plTimer = setTimeout(plAdvance, dur);
    }
    el.style.visibility = 'hidden';
    stage.appendChild(el);
  }

  // ---- Target dispatch (dual-shape). ----
  function normalize(data) {
    if (!data || typeof data !== 'object') return { kind: 'none' };
    if (typeof data.kind === 'string') return data;
    if (Array.isArray(data.items) && 'playlist_id' in data) return { kind: data.playlist_id ? 'playlist' : 'none', playlist: data };
    if (Array.isArray(data.widgets) && 'scene_id' in data) return { kind: 'scene', scene: data };
    if (Array.isArray(data.scenes) && 'scene_playlist_id' in data) return { kind: 'scene_playlist', scene_playlist: data };
    return { kind: 'none' };
  }
  function revKeyOf(t) {
    if (t.kind === 'playlist') return 'pl:' + ((t.playlist && t.playlist.revision) || '');
    if (t.kind === 'scene') return 'sc:' + ((t.scene && t.scene.revision) || '');
    if (t.kind === 'scene_playlist') return 'spl:' + ((t.scene_playlist && t.scene_playlist.revision) || '');
    return 'none';
  }
  function teardown() {
    genId++; switchSerial++; plSerial++;
    if (plTimer) { clearTimeout(plTimer); plTimer = null; }
    if (sceneTimer) { clearTimeout(sceneTimer); sceneTimer = null; }
  }
  function applyTarget(data) {
    const t = normalize(data);
    const key = revKeyOf(t);
    if (key === revKey) return;
    revKey = key;
    teardown();
    mode = t.kind;
    if (t.kind === 'playlist') startPlaylist(t.playlist || { items: [] });
    else if (t.kind === 'scene') startScene(t.scene);
    else if (t.kind === 'scene_playlist') startScenePlaylist(t.scene_playlist || { scenes: [] });
    else showIdle('No content assigned');
  }

  window.addEventListener('resize', () => {
    document.querySelectorAll('.scene-canvas').forEach((c) => { if (c._scene) layoutCanvas(c, c._scene); });
  });

  // ---- Preview data source: fetch a resolved shape straight from the API. ----
  function sourceURL() {
    if (SRC_URL) return SRC_URL;
    if (!API) return null;
    if (Q.get('playlist')) return `${API}/api/playlists/${Q.get('playlist')}/resolved`;
    if (Q.get('scene')) return `${API}/api/scenes/${Q.get('scene')}/resolved`;
    if (Q.get('scene_playlist')) return `${API}/api/scene-playlists/${Q.get('scene_playlist')}/resolved`;
    return null;
  }
  async function load() {
    const url = sourceURL();
    if (!url) { showIdle('Pass ?api= & one of playlist / scene / scene_playlist (or ?src=)'); return; }
    try {
      const r = await fetch(url, { headers: TOKEN ? { Authorization: 'Bearer ' + TOKEN } : {} });
      applyTarget(await r.json());
    } catch (_) {
      // Keep showing current content; only surface an error before anything loaded.
      if (revKey === null) showIdle('Failed to load content');
    }
  }

  load();
  setInterval(load, 15000);
})();
</script>
</body>
</html>
